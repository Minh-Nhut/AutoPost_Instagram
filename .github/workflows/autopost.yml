name: Instagram AutoPost

on:
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Instagram AutoPost Bot
        env:
          CREDENTIALS_JSON_B64: ${{ secrets.CREDENTIALS_JSON_B64 }}
          INSTAGRAM_SESSION_B64: ${{ secrets.INSTAGRAM_SESSION_B64 }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          TZ: Asia/Ho_Chi_Minh
        run: python bot_once.py

      - name: Upload debug screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/debug_*.png
          if-no-files-found: ignore
